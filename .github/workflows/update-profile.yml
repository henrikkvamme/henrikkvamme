name: Update profile card

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-card
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test profile generator
        run: python -m unittest discover -s tests -v

      - name: Generate profile card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_profile.py

      - name: Commit changed statistics
        run: |
          if git diff --quiet -- assets/dark-mode.svg assets/light-mode.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dark-mode.svg assets/light-mode.svg
          git commit -m "Update profile statistics"
          git push
